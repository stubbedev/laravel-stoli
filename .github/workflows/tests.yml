name: Tests

on:
  push:
  pull_request:

jobs:
  matrix:
    name: Build version matrix
    runs-on: ubuntu-latest
    outputs:
      php: ${{ steps.versions.outputs.php }}
      laravel: ${{ steps.versions.outputs.laravel }}
    steps:
      # Derive the matrix from endoflife.date: every version still receiving
      # support (security phase, "eol" date in the future) is tested.
      - name: Resolve supported versions
        id: versions
        run: |
          today=$(date +%F)
          filter='[.[] | select(((.eol|type)=="boolean" and .eol) or ((.eol|type)=="string" and .eol >= $t)) | .cycle]'
          php=$(curl -fsSL https://endoflife.date/api/php.json | jq -c --arg t "$today" "$filter")
          laravel=$(curl -fsSL https://endoflife.date/api/laravel.json | jq -c --arg t "$today" "$filter")
          echo "php=$php" >> "$GITHUB_OUTPUT"
          echo "laravel=$laravel" >> "$GITHUB_OUTPUT"
          echo "PHP: $php"
          echo "Laravel: $laravel"

  tests:
    name: PHP ${{ matrix.php }} with Laravel ${{ matrix.laravel }}
    needs: matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ${{ fromJson(needs.matrix.outputs.php) }}
        laravel: ${{ fromJson(needs.matrix.outputs.laravel) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Setup Problem Matchers
        run: echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Select Laravel ${{ matrix.laravel }}
        run: composer require "laravel/framework:${{ matrix.laravel }}.*" --no-update --no-interaction

      # Some PHP/Laravel pairs in the matrix are incompatible (e.g. an older
      # security-phase PHP with a newer Laravel that needs a higher PHP).
      # Detect those and skip rather than fail the run.
      - name: Check combo is resolvable
        id: resolve
        run: |
          if composer update --dry-run --no-interaction >/dev/null 2>&1; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "PHP ${{ matrix.php }} + Laravel ${{ matrix.laravel }} not resolvable — skipping."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.resolve.outputs.ok == 'true'
        uses: nick-invision/retry@v2
        with:
          timeout_minutes: 5
          max_attempts: 5
          command: composer update --no-interaction --no-progress

      - name: Run tests for Laravel ${{ matrix.laravel }}
        if: steps.resolve.outputs.ok == 'true'
        run: vendor/bin/phpunit
